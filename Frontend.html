                  ${p.status === 'sold' ? '🏷️ Sold' : p.status === 'traded' ? '🔄 Traded' : '📦 Archived'}
                </span>
              </div>
            ` : ''}

            <div style="display:flex; gap:10px; flex-wrap:wrap;">
              ${!isOwn ? `
                ${!p.status || p.status === 'active' ? `
                  <button class="btn btn-primary" onclick="startMsgFromPost()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 6h14v10H8l-3 3V6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
                    Message
                  </button>
                ` : `
                  <div style="font-size:13px;color:var(--muted);align-self:center">This item is no longer available</div>
                `}
                <button class="btn btn-ghost" onclick="state.user ? goTo('review',{user:state.postOwner}) : goTo('auth')">Leave Review</button>
                <button class="btn btn-ghost" onclick="handleLike('${esc(p.id)}', event)" style="display:flex;align-items:center;gap:5px">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                      stroke="#f086b0" stroke-width="2" stroke-linejoin="round"/>
                  </svg>
                  Like
                </button>
              ` : `
                <button class="btn btn-ghost" onclick="startEditPost()">Edit Post</button>
                ${!p.status || p.status === 'active' ? `
                  <button class="btn btn-ghost" style="color:#2e7d32;border-color:#a5d6a7"
                    onclick="markPostStatus('${esc(p.id)}','traded').then(()=>render())">
                    Mark as Traded
                  </button>
                  <button class="btn btn-ghost" style="color:#c62828;border-color:#ef9a9a"
                    onclick="markPostStatus('${esc(p.id)}','sold').then(()=>render())">
                    Mark as Sold
                  </button>
                ` : `
                  <button class="btn btn-ghost"
                    onclick="markPostStatus('${esc(p.id)}','active').then(()=>render())">
                    Relist Post
                  </button>
                `}
              `}
              <button class="btn btn-ghost" onclick="goTo('profile', { userId: '${esc(owner?.id || '')}' })">View Profile</button>
            </div>

            <div style="margin-top:16px; font-size:11px; color:var(--muted)">
              Posted ${p.created_at ? new Date(p.created_at).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) : ''}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ── PROFILE PAGE ──
  function renderProfile() {
    const u = state.profileUser;
    const isOwn = state.user && u && state.user.id === u.id;

    if (state.profileLoading) return `<div class="page"><div class="spinner-wrap"><div class="spinner"></div></div></div>`;
    if (!u) return `<div class="page"><div style="color:var(--muted); text-align:center; padding:60px">User not found</div></div>`;

    const tabs = [
      { key:'trading', label:'🔄 Trading' },
      { key:'iso',     label:'🔍 ISO' },
      { key:'sell',    label:'🏷️ Selling' },
      { key:'likes',   label:'💜 Likes' },
      { key:'reviews', label:'⭐ Reviews' },
    ];

    let tabContent = '';
    if (state.profileTab === 'reviews') {
      if (!state.profileReviews.length) {
        tabContent = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 2l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z" stroke="#f9b8d0" stroke-width="2" stroke-linejoin="round"/></svg></div><div style="font-weight:700; color:var(--ink2)">No reviews yet</div></div>`;
      } else {
        tabContent = `<div style="display:flex; flex-direction:column; gap:14px;">
          ${state.profileReviews.map((r,i) => `
            <div class="review-card" style="animation-delay:${i*.04}s">
              <div class="review-top">
                <span class="reviewer-name">@${esc(r.reviewer_username || 'user')}</span>
                ${starsFor(r.rating)}
              </div>
              ${r.review_text ? `<div class="review-text">${esc(r.review_text)}</div>` : ''}
              ${r.shipping_time ? `<div class="review-shipping">Shipping: ${esc(r.shipping_time)}</div>` : ''}
            </div>
          `).join('')}
        </div>`;
      }
    } else {
      const posts = state.profilePosts.filter(p => {
        if (state.profileTab === 'trading') return p.type === 'trading';
        if (state.profileTab === 'iso') return p.type === 'iso';
        if (state.profileTab === 'sell') return p.type === 'selling';
        return true; // likes — all
      });
      if (!posts.length) {
        tabContent = `<div class="empty-state" style="grid-column:1/-1; padding:40px 0"><div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="3" stroke="#d4b8f9" stroke-width="2"/></svg></div><div style="font-weight:700; color:var(--ink2)">No posts here</div></div>`;
      } else {
        tabContent = `<div class="profile-grid">
          ${posts.map((p,i) => `
            <div class="post-tile" style="animation-delay:${i*.04}s" onclick="goTo('post', { postId: '${esc(p.id)}' })">
              <div class="post-tile-img" style="aspect-ratio:3/4">
                ${p.image_url ? `<img src="${esc(p.image_url)}" alt="" loading="lazy">` : noImgSvg()}
              </div>
              <div class="post-tile-body" style="padding:10px 12px 12px">
                <div class="post-tile-desc" style="font-size:12px">${esc(p.title || p.description)}</div>
                ${pillFor(p.type)}
              </div>
            </div>
          `).join('')}
        </div>`;
      }
    }

    return `
    <div class="page-anim">
      <div class="card" style="overflow:hidden; margin-bottom:0; border-radius: var(--radius-xl);">
        <div class="profile-banner"></div>
        <div class="profile-body">
          <div class="profile-top">
            <div class="profile-avatar">${avatarFor(u.avatar_url, 72)}</div>
            <div class="profile-info">
              <div class="profile-name">${esc(u.username)}</div>
              <div class="profile-stats" style="margin-bottom:6px">
                <span><strong>${u.followers_count || 0}</strong> followers</span>
                <span><strong>${u.following_count || 0}</strong> following</span>
              </div>
              ${u.bio ? `<div class="profile-bio">${esc(u.bio)}</div>` : ''}
              <div class="profile-stat-chips">
                ${u.avg_rating ? `
                  <div class="profile-stat-chip chip-rating">
                    ${starsFor(u.avg_rating)}
                    <span class="chip-val">${u.avg_rating.toFixed(1)}</span>
                    <span>avg rating</span>
                  </div>` : ''}
                ${u.avg_shipping_time ? `
                  <div class="profile-stat-chip chip-ship">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                      <rect x="2" y="7" width="16" height="13" rx="2" stroke="#b09abf" stroke-width="2"/>
                      <path d="M18 10h2l2 4v3h-4" stroke="#b09abf" stroke-width="2" stroke-linejoin="round"/>
                      <circle cx="7" cy="20" r="2" stroke="#b09abf" stroke-width="2"/>
                      <circle cx="17" cy="20" r="2" stroke="#b09abf" stroke-width="2"/>
                    </svg>
                    <span class="chip-val">${esc(u.avg_shipping_time)}</span>
                    <span>avg shipping</span>
                  </div>` : ''}
              </div>
            </div>
            <div class="profile-actions">
              ${isOwn
                ? `<button class="btn btn-ghost" onclick="goTo('editprofile')">Edit Profile</button>`
                : `<div style="display:flex;gap:8px;flex-wrap:wrap">
                    <button class="btn btn-follow" onclick="handleFollow('${esc(u.id)}')">+ Follow</button>
                    <button class="btn btn-ghost" onclick="startMsgFromProfile()">💬 Message</button>
                    <button class="btn btn-ghost" onclick="goTo('review',{user:state.profileUser})">⭐ Review</button>
                   </div>`
              }
            </div>
          </div>

          <div class="tabs">
            ${tabs.map(t => `
              <button class="tab-btn ${state.profileTab === t.key ? 'active' : ''}"
                onclick="loadProfileTab('${t.key}')">
                ${t.label}
              </button>
            `).join('')}
          </div>

          ${tabContent}
        </div>
      </div>
    </div>
    <div class="page" style="padding-top:0"></div>`;
  }

  // ── CREATE POST PAGE ──
  function startEditPost() {
    const p = state.postDetail;
    if (!p) return;
    state.editPostId = p.id;
    state.createDraft = {
      type:        p.type || 'trading',
      title:       p.title || '',
      description: p.description || '',
      tags:        (p.tags || []).join(', '),
      imageUrl:    p.image_url || null,
      imageFile:   null,
    };
    goTo('create');
  }

  function renderCreate() {
    if (!state.user) {
      return `<div class="page page-anim" style="text-align:center; padding-top:60px">
        <div style="font-family:var(--font-serif); font-size:24px; margin-bottom:12px">Sign in to post 🌸</div>
        <button class="btn btn-primary" onclick="goTo('auth')">Sign In</button>
      </div>`;
    }

    const types = [
      { key:'trading',     label:'Trading',     sub:'Swap cards with others' },
      { key:'iso',         label:'ISO',         sub:'In Search Of — looking for' },
      { key:'selling',     label:'Selling',     sub:'Sell your photocards' },
    ];

    return `
    <div class="page page-anim">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px">
        <div>
          <div style="font-family:var(--font-serif); font-size:28px">${state.editPostId ? 'Edit Listing' : 'New Listing'}</div>
          <div style="font-size:13px; color:var(--muted); margin-top:2px">${state.editPostId ? 'Update your post details' : 'Share your photocards with the community'}</div>
        </div>
        <button class="btn btn-ghost" onclick="state.editPostId=null; goTo(state.prevPage||'discover')">Cancel</button>
      </div>

      <div class="create-layout">
        <!-- Image upload -->
        <div>
          <div class="upload-zone" id="uploadZone">
            <input type="file" accept="image/*" onchange="handleImagePick(event)">
            <img id="uploadPreview" style="display:none" alt="">
            <div id="uploadIconWrap">
              <div class="upload-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="white" stroke-width="2" stroke-linecap="round"/>
                  <polyline points="17 8 12 3 7 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="12" y1="3" x2="12" y2="15" stroke="white" stroke-width="2" stroke-linecap="round"/>

  // Fetch post for a thread and attach it — always overwrites so both sides stay in sync
  async function fetchAndAttachPost(userId, postId) {
    if (!postId) return null;
    try {
      const pd = await api(`/posts/${postId}`);
      if (!pd.post) return null;
      const thread = state.msgThreads.find(t => t.userId === userId);
      if (thread) thread.postContext = pd.post;
      // Ensure post_context card is in messages (always at position 0)
      if (!state.msgMessages[userId]) state.msgMessages[userId] = [];
      state.msgMessages[userId] = state.msgMessages[userId].filter(m => m.type !== 'post_context');
      state.msgMessages[userId].unshift({
        id: 'ctx_' + postId, from: '__system__', type: 'post_context',
        post: pd.post, time: '__top__'
      });
      return pd.post;
    } catch(e) { return null; }
  }

  async function openMsgThread(userId, username, avatarUrl, postContext) {
    let thread = state.msgThreads.find(t => t.userId === userId);
    if (!thread) {
      thread = { userId, username, avatarUrl, lastMsg: '', lastTime: '', unread: false, postContext: postContext || null, tradeStatus: null };
      state.msgThreads.unshift(thread);
    }
    // If we have a postContext passed in (from post page), attach it immediately
    if (postContext) {
      thread.postContext = postContext;
      if (!state.msgMessages[userId]) state.msgMessages[userId] = [];
      state.msgMessages[userId] = state.msgMessages[userId].filter(m => m.type !== 'post_context');
      state.msgMessages[userId].unshift({
        id: 'ctx_' + postContext.id, from: '__system__', type: 'post_context',
        post: postContext, time: '__top__'
      });
    }
    state.msgActiveThread = userId;
    state.msgPostContext = null;
    await loadMessages(userId);
  }

  async function loadMessages(userId) {
    try {
      const data = await api(`/messages/${userId}`);
      const rawMsgs = data.messages || [];

      // Get post_id from any message that has one
      const postId = (rawMsgs.find(m => m.post_id) || {}).post_id || null;

      // Build text messages
      const textMsgs = rawMsgs.map(m => ({
        id: m.id, from: m.sender_id, text: m.text,
        time: m.created_at, type: 'text'
      }));

      // Keep safety/review system messages, drop old text + post_context (will rebuild)
      const keepMsgs = (state.msgMessages[userId] || []).filter(
        m => m.type !== 'text' && m.type !== 'post_context'
      );

      // If we have a postId, fetch the post once and build context message
      let postCtxMsg = null;
      if (postId) {
        const thread = state.msgThreads.find(t => t.userId === userId);
        // Use cached postContext if same post, otherwise fetch
        if (thread && thread.postContext && thread.postContext.id === postId) {
          postCtxMsg = { id: 'ctx_' + postId, from: '__system__', type: 'post_context', post: thread.postContext, time: '__top__' };
        } else {
          try {
            const pd = await api(`/posts/${postId}`);
            if (pd.post) {
              if (thread) thread.postContext = pd.post;
              postCtxMsg = { id: 'ctx_' + postId, from: '__system__', type: 'post_context', post: pd.post, time: '__top__' };
            }
          } catch(e) {}
        }
      }

      // Assemble final message list: post context first, then system msgs, then text
      const allMsgs = [...keepMsgs, ...textMsgs];
      allMsgs.sort((a, b) => new Date(a.time) - new Date(b.time));
      if (postCtxMsg) allMsgs.unshift(postCtxMsg);
      state.msgMessages[userId] = allMsgs;

      // Update thread preview
      const thread = state.msgThreads.find(t => t.userId === userId);
      if (thread && textMsgs.length) {
        const last = textMsgs[textMsgs.length - 1];
        thread.lastMsg = last.text;
        thread.lastTime = fmtTime(last.time);
      }

      render();
      setTimeout(() => {
        const body = document.getElementById('msgBody');
        if (body) body.scrollTop = body.scrollHeight;
      }, 50);
    } catch(e) {}
  }

  async function loadAllThreads() {
    try {
      const data = await api('/messages/threads');
      // Fetch all post contexts in parallel
      const postCache = {};
      const postIds = [...new Set((data.threads || []).map(t => t.post_id).filter(Boolean))];
      await Promise.all(postIds.map(async pid => {
        try {
          const pd = await api(`/posts/${pid}`);
          if (pd.post) postCache[pid] = pd.post;
        } catch(e) {}
      }));

      for (const t of (data.threads || [])) {
        let thread = state.msgThreads.find(th => th.userId === t.other_user_id);
        const postContext = t.post_id ? (postCache[t.post_id] || null) : null;
        if (!thread) {
          state.msgThreads.push({
            userId: t.other_user_id,
            username: t.other_username,
            avatarUrl: t.other_avatar || null,
            lastMsg: t.last_message,
            lastTime: fmtTime(t.last_time),
            unread: t.unread || false,
            postContext,
            tradeStatus: null
          });
        } else {
          thread.lastMsg = t.last_message;
          thread.lastTime = fmtTime(t.last_time);
          thread.unread = t.unread || false;
          // Always update postContext from server
          if (postContext) thread.postContext = postContext;
        }
      }
      render();
    } catch(e) {}
  }

  async function sendMessage() {
    const uid = state.msgActiveThread;
    if (!uid || !state.user) return;
    const input = document.getElementById('msgInput');
    const text = (input?.value || '').trim();
    if (!text) return;
    input.value = '';

    // Optimistic local add
    if (!state.msgMessages[uid]) state.msgMessages[uid] = [];
    const tempMsg = { id: 'tmp_' + Date.now(), from: state.user.id, text, time: new Date().toISOString(), type: 'text' };
    state.msgMessages[uid].push(tempMsg);
    const thread = state.msgThreads.find(t => t.userId === uid);
    if (thread) { thread.lastMsg = text; thread.lastTime = 'now'; }
    render();
    setTimeout(() => { const b = document.getElementById('msgBody'); if (b) b.scrollTop = b.scrollHeight; }, 50);

    // Send to backend — include post_id if this thread has a post context
    try {
      const thread = state.msgThreads.find(t => t.userId === uid);
      const postId = thread?.postContext?.id || null;
      await api('/messages', { method: 'POST', body: JSON.stringify({ recipient_id: uid, text, post_id: postId }) });
      await loadMessages(uid);
    } catch(e) {
    }

    // Safety check after 3 real messages
    const textMsgs = state.msgMessages[uid].filter(m => m.type === 'text' && m.from === state.user.id);
    if (textMsgs.length === 3 && !state.msgMessages[uid].some(m => m.type === 'safety_check')) {
      setTimeout(() => {
        state.msgMessages[uid].push({ id: 'safety_' + Date.now(), from: '__system__', type: 'safety_check', time: new Date().toISOString() });
        render();
      }, 800);
    }
  }

  async function markPostStatus(postId, status) {
    if (!postId) return;
    try {
      await api(`/posts/${postId}`, {
        method: 'PATCH',
        body: JSON.stringify({ status })
      });
      // Update local postDetail if it's the same post
      if (state.postDetail && state.postDetail.id === postId) {
        state.postDetail.status = status;
      }
      // Update in discoverPosts cache
      const cached = state.discoverPosts.find(p => p.id === postId);
      if (cached) cached.status = status;
    } catch(e) { toast('Could not update post status', 'error'); }
  }

  function acceptTrade() {
    const uid = state.msgActiveThread;
    if (!uid) return;
    const thread = state.msgThreads.find(t => t.userId === uid);
    if (thread) thread.tradeStatus = 'accepted';

    // Mark the post as traded/sold on the backend
    const postId = thread?.postContext?.id;
    const postType = thread?.postContext?.type;
    if (postId) {
      const newStatus = (postType === 'selling' || postType === 'for_purchase') ? 'sold' : 'traded';
      markPostStatus(postId, newStatus);
    }

    if (!state.msgMessages[uid]) state.msgMessages[uid] = [];
    state.msgMessages[uid].push({
      id: 'trade_acc_' + Date.now(), from: '__system__', type: 'system',
      text: '🎉 Trade accepted! Once you have both shipped, confirm below.',
      time: new Date().toISOString()
    });
    // Schedule shipping check-in after 2s (simulates later trigger)
    setTimeout(() => {
      if (state.msgMessages[uid]) {
        state.msgMessages[uid].push({
          id: 'safety_' + Date.now(), from: '__system__', type: 'safety_check',
          time: new Date().toISOString()
        });
        render();
        setTimeout(() => { const b = document.getElementById('msgBody'); if (b) b.scrollTop = b.scrollHeight; }, 50);
      }
    }, 2000);
    render();
    toast('Trade accepted! 🌸', 'success');
  }

  function declineTrade() {
    const uid = state.msgActiveThread;
    if (!uid) return;
    const thread = state.msgThreads.find(t => t.userId === uid);
    if (thread) thread.tradeStatus = 'declined';
    if (!state.msgMessages[uid]) state.msgMessages[uid] = [];
    state.msgMessages[uid].push({
      id: 'trade_dec_' + Date.now(), from: '__system__', type: 'system',
      text: '❌ Trade declined. You can keep chatting to negotiate.',
      time: new Date().toISOString()
    });
    render();
  }

  function handleSafetyResponse(outcome) {
    const uid = state.msgActiveThread;
    if (!uid) return;
    if (outcome === 'yes') {
      state.msgMessages[uid].push({
        id: 'sys_' + Date.now(), from: '__system__', type: 'system',
        text: '🎉 Awesome! Your trade is confirmed. Please leave a review for your trader.',
        time: new Date().toISOString()
      });
      // add review prompt
      state.msgMessages[uid].push({
        id: 'rev_' + Date.now(), from: '__system__', type: 'review_prompt',
        forUserId: uid, time: new Date().toISOString()
      });
    } else {
      state.msgMessages[uid].push({
        id: 'sys_' + Date.now(), from: '__system__', type: 'system',
        text: "😔 Sorry to hear that. We'll check in again soon. Make sure to keep your chat records.",
        time: new Date().toISOString()
      });
    }
    // remove the safety check card
    state.msgMessages[uid] = state.msgMessages[uid].filter(m => m.type !== 'safety_check');
    render();
    setTimeout(() => {
      const body = document.getElementById('msgBody');
      if (body) body.scrollTop = body.scrollHeight;
    }, 50);
  }

  async function selectThread(userId) {
    clearInterval(window._msgPoll);
    state.msgActiveThread = userId;
    const thread = state.msgThreads.find(t => t.userId === userId);
    if (thread) thread.unread = false;
    render();  // render immediately so input bar shows
    await loadMessages(userId);
    // Focus input after messages load
    setTimeout(() => {
      const input = document.getElementById('msgInput');
      if (input) input.focus();
    }, 100);
  }

  async function refreshMessages() {
    await loadAllThreads();
    if (state.msgActiveThread) {
      await loadMessages(state.msgActiveThread);
    }
  }

  function fmtTime(iso) {
    if (!iso || iso === '__top__') return '';
    // Ensure UTC parsing — append Z if no timezone indicator
    let str = String(iso);
    if (!str.endsWith('Z') && !str.includes('+') && str.includes('T')) str += 'Z';
    const d = new Date(str);
    if (isNaN(d.getTime())) return '';
    const now = new Date();
    const diff = now - d;
    if (diff < 0) return 'just now';        // clock skew guard
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

                return `
                  <div style="display:flex;gap:8px;align-items:flex-end;justify-content:${isMe ? 'flex-end' : 'flex-start'}">
                    ${!isMe ? `<div class="bubble-avatar">${bubbleAvatarHtml(activeThread ? activeThread.avatarUrl : null)}</div>` : ''}
                    <div style="display:flex;flex-direction:column;align-items:${isMe ? 'flex-end' : 'flex-start'}">
                      <div class="msg-bubble" style="${isMe ? 'background:linear-gradient(135deg,rgba(249,184,208,.3),rgba(212,184,249,.3));border-color:var(--lavender)' : ''}">${esc(m.text)}</div>
                      <div class="bubble-time">${fmtTime(m.time)}</div>
                    </div>
                    ${isMe ? `<div class="bubble-avatar">${bubbleAvatarHtml(state.user.avatar_url)}</div>` : ''}
                  </div>`;
              }).join('')}
            </div>

            <!-- Input -->
            <div class="msg-input-bar">
              <input class="msg-input" id="msgInput" placeholder="Type your message…"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" />
              <button class="msg-send-btn" onclick="sendMessage()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          `}
        </div>

        <!-- ── RIGHT: INFO PANEL ── -->
        <div class="msg-right-panel">
          ${!activeUid
            ? `<div class="msg-right-section" style="text-align:center;color:var(--muted);font-size:12px;padding:28px 16px;line-height:1.6">
                 Select a conversation<br>to see details
               </div>`
            : `
              <!-- Safety notice -->
              <div style="padding:12px 14px;border-bottom:1px solid var(--border)">
                <div class="msg-safety-banner">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;margin-top:1px">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#b09abf" stroke-width="2" stroke-linejoin="round"/>
                  </svg>
                  Keep it on UTradeMi. Never share personal info or arrange trades outside the platform.
                </div>
              </div>

              <!-- Trader profile -->
              <div class="msg-right-section">
                <div class="msg-right-user">
                  <div class="msg-right-avatar">
                    ${rightAvatarHtml(activeThread ? activeThread.avatarUrl : null)}
                  </div>
                  <div class="msg-right-username" onclick="goTo('profile',{userId:'${esc(activeUid)}'})">
                    @${esc(activeThread ? activeThread.username : '')}
                  </div>
                  <div class="msg-right-meta">Kpop photocard trader</div>
                </div>
              </div>

              <!-- Item image + info (show if postContext available) -->
              ${activeThread && activeThread.postContext ? `
                <div class="msg-right-section">
                  <div class="msg-right-label">Item Being Discussed</div>
                  <div class="msg-item-img-card" onclick="goTo('post',{postId:'${esc(activeThread.postContext.id || '')}' })">
                    ${activeThread.postContext.image_url
                      ? `<img src="${esc(activeThread.postContext.image_url)}" alt="">`
                      : `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" opacity=".3">
                           <rect x="3" y="5" width="18" height="14" rx="3" stroke="#d4b8f9" stroke-width="2"/>
                           <circle cx="9" cy="10" r="2" stroke="#f9b8d0" stroke-width="1.5"/>
                         </svg>`
                    }
                  </div>
                  <div style="font-size:13px;font-weight:800;margin-bottom:4px;line-height:1.4">
                    ${esc(activeThread.postContext.title || activeThread.postContext.description || 'View listing')}
                  </div>
                  <div style="margin-bottom:12px">${pillFor(activeThread.postContext.type || 'trading')}</div>
                </div>
              ` : ''}

              <!-- Trade offer buttons — always visible when there's an active conversation -->
              <div class="msg-right-section">
                <div class="msg-right-label" style="margin-bottom:10px">Trade</div>
                ${(() => {
                  const tradeStatus = activeThread ? activeThread.tradeStatus : null;
                  if (tradeStatus === 'accepted') {
                    return `
                      <div class="trade-status-badge trade-status-accepted" style="margin-bottom:8px">✅ Trade Accepted</div>
                      <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:4px">Shipping check-in will appear in chat</div>`;
                  }
                  if (tradeStatus === 'declined') {
                    return `
                      <div class="trade-status-badge trade-status-declined" style="margin-bottom:8px">❌ Trade Declined</div>
                      <button class="trade-accept-btn" style="margin-top:8px" onclick="acceptTrade()">Reconsider → Accept</button>`;
                  }
                  return `
                    <div style="display:flex;flex-direction:column;gap:8px">
                      <button class="trade-accept-btn" onclick="acceptTrade()">✅ Accept Trade</button>
                      <button class="trade-decline-btn" onclick="declineTrade()">✕ Decline</button>
                    </div>
                    <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:8px;line-height:1.5">
                      Accepting will trigger a shipping check-in once both sides have confirmed
                    </div>`;
                })()}
              </div>

              <!-- Profile actions -->
              <div class="msg-right-section" style="display:flex;flex-direction:column;gap:8px">
                <button class="btn btn-primary" style="width:100%;justify-content:center"
                  onclick="goTo('profile',{userId:'${esc(activeUid)}'})">View Profile</button>
                <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:12px"
                  onclick="goTo('review',{userId:'${esc(activeUid)}'})">Leave a Review</button>
              </div>
            `
          }
        </div>

      </div>
    </div>`;
  }



  // ═══════════════════════════════════════════════
  //  RENDER: REVIEW PAGE
  // ═══════════════════════════════════════════════
  function renderReview() {
    if (!state.user) {
      return `<div class="page page-anim" style="text-align:center;padding-top:60px">
        <div style="font-family:var(--font-serif);font-size:22px;margin-bottom:12px">Sign in to leave a review</div>
        <button class="btn btn-primary" onclick="goTo('auth')">Sign In</button>
      </div>`;
    }

    const target = state.reviewTargetUser;
    if (!target) {
      return `<div class="page page-anim" style="text-align:center;padding-top:60px;color:var(--muted)">
        No user selected. <button class="btn btn-ghost" style="margin-top:12px" onclick="goTo('discover')">Back to Discover</button>
      </div>`;
    }

    const ratingLabels = ['', 'Terrible 😞', 'Poor 😕', 'Okay 😐', 'Good 😊', 'Amazing! 🌸'];

    return `
    <div class="page page-anim">
      <div class="review-page">

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
          <button class="btn btn-ghost" onclick="goTo(state.prevPage||'discover')">← Back</button>
          <div style="font-family:var(--font-serif);font-size:26px">Leave a Review</div>
        </div>

        <!-- Who you're reviewing -->
        <div class="review-user-card">
          <div class="review-user-avatar">
            ${target.avatar_url
              ? `<img src="${esc(target.avatar_url)}" alt="">`
              : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#b09abf" stroke-width="2"/><path d="M4.5 20c2-5 13-5 15 0" stroke="#b09abf" stroke-width="2" stroke-linecap="round"/></svg>`
            }
          </div>
          <div>
            <div style="font-weight:800;font-size:16px">@${esc(target.username)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">
              ${target.avg_rating ? `${starsFor(target.avg_rating)} ${target.avg_rating.toFixed(1)} avg rating` : 'No reviews yet'}
            </div>
          </div>
          <button class="btn btn-ghost" style="margin-left:auto;font-size:12px"
            onclick="goTo('profile',{userId:'${esc(target.id)}'})">View Profile</button>
        </div>

        <div class="card" style="padding:28px">

          <!-- Star rating -->
          <div style="text-align:center;margin-bottom:6px">
            <div style="font-size:13px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">
              Overall Rating *
            </div>
          </div>
          <div class="star-row" id="starRow">
            ${[1,2,3,4,5].map(n => `
              <button class="star-btn ${n <= state.reviewRating ? 'lit' : ''}"
                id="star${n}"
                onmouseover="hoverStar(${n})"
                onmouseout="unhoverStar()"
                onclick="setStar(${n})">★</button>
            `).join('')}
          </div>
          <div class="rating-label" id="ratingLabel">
            ${ratingLabels[state.reviewRating] || 'Tap a star to rate'}
          </div>

          <div class="divider" style="margin:18px 0"></div>

          <!-- Review text -->
          <div class="form-group" style="margin-bottom:16px">
            <div class="form-label">Your Review</div>
            <textarea class="form-textarea" id="reviewText" placeholder="How was your experience trading with this person? Were they responsive, did the card arrive as described?…" style="min-height:120px" maxlength="1000"></textarea>
          </div>

          <!-- Shipping time -->
          <div class="form-group" style="margin-bottom:20px">
            <div class="form-label">Shipping Time <span style="font-weight:400;text-transform:none;color:var(--muted)">(optional)</span></div>
            <input class="form-input" id="reviewShipping" placeholder="e.g. 3 days, 1 week…">
            <div style="font-size:11px;color:var(--muted);margin-top:5px">This helps the community know how fast this trader ships</div>
          </div>

          <!-- Submit -->
          <button class="review-submit-btn" id="reviewSubmitBtn" onclick="handleSubmitReview()"
            ${state.reviewRating === 0 ? 'disabled' : ''}>
            ${state.reviewRating === 0 ? 'Select a rating to continue' : 'Submit Review 🌸'}
          </button>
        </div>
      </div>
    </div>`;
  }

  function hoverStar(n) {
    state.reviewHover = n;
    for (let i = 1; i <= 5; i++) {
      const s = document.getElementById('star' + i);
      if (s) {
        s.classList.toggle('lit', i <= state.reviewRating);
        s.classList.toggle('hover', i <= n);
      }
    }
  }

  function unhoverStar() {
    state.reviewHover = 0;
    for (let i = 1; i <= 5; i++) {
      const s = document.getElementById('star' + i);
      if (s) {
        s.classList.remove('hover');
        s.classList.toggle('lit', i <= state.reviewRating);
      }
    }
    const labels = ['', 'Terrible 😞', 'Poor 😕', 'Okay 😐', 'Good 😊', 'Amazing! 🌸'];
    const lbl = document.getElementById('ratingLabel');
    if (lbl) lbl.textContent = labels[state.reviewRating] || 'Tap a star to rate';
  }

  function setStar(n) {
    state.reviewRating = n;
    const labels = ['', 'Terrible 😞', 'Poor 😕', 'Okay 😐', 'Good 😊', 'Amazing! 🌸'];
    const lbl = document.getElementById('ratingLabel');
    if (lbl) lbl.textContent = labels[n];
    for (let i = 1; i <= 5; i++) {
      const s = document.getElementById('star' + i);
      if (s) { s.classList.toggle('lit', i <= n); s.classList.remove('hover'); }
    }
    const btn = document.getElementById('reviewSubmitBtn');
    if (btn) { btn.disabled = false; btn.textContent = 'Submit Review 🌸'; }
  }

  async function handleSubmitReview() {
    if (!state.reviewRating) { toast('Please select a rating', 'error'); return; }
    const target = state.reviewTargetUser;
    if (!target) return;

    const reviewText = document.getElementById('reviewText')?.value?.trim() || null;
    const shippingTime = document.getElementById('reviewShipping')?.value?.trim() || null;

    const btn = document.getElementById('reviewSubmitBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

    try {
      await api('/reviews', {
        method: 'POST',
        body: JSON.stringify({
          reviewed_user_id: target.id,
          rating: state.reviewRating,
          review_text: reviewText,
          shipping_time: shippingTime,
        })
      });
      toast('Review submitted! Thank you 🌸', 'success');
      state.reviewRating = 0;
      goTo('profile', { userId: target.id });
    } catch(e) {
      toast(e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Submit Review 🌸'; }
    }
  }

  // ═══════════════════════════════════════════════
  //  MAIN RENDER
  // ═══════════════════════════════════════════════
  function render() {
    const root = document.getElementById('root');
    switch (state.page) {
      case 'auth':        root.innerHTML = renderAuth(); break;
      case 'discover':    root.innerHTML = renderDiscover(); break;
      case 'post':        root.innerHTML = renderPost(); break;
      case 'profile':     root.innerHTML = renderProfile(); break;
      case 'create':      root.innerHTML = renderCreate(); break;
      case 'editprofile': root.innerHTML = renderEditProfile(); break;
      case 'review':      root.innerHTML = renderReview(); break;
      case 'messages':    root.innerHTML = renderMessages(); break;
      default:            root.innerHTML = renderDiscover();
    }
  }

  // ═══════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════
  async function init() {
    // Restore custom tags from localStorage
    const savedTags = localStorage.getItem('utm_custom_tags');
    if (savedTags) state.customTags = JSON.parse(savedTags);
    const token = getToken();
    if (token) {
      try {
        const d = await api('/auth/me');
        state.user = d.user;
        // update avatar
        const ab = document.getElementById('myAvatarBtn');
        if (ab && state.user?.avatar_url) {
          ab.innerHTML = `<img src="${esc(state.user.avatar_url)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:999px">`;
        }
      } catch(e) { clearToken(); }
    }
    await goTo('discover');
  }

  init();
  </script>
</body>
</html>
